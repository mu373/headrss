name = "headrss"
main = "src/index.ts"
compatibility_date = "2026-03-19"
compatibility_flags = ["nodejs_compat"]

# Required secrets:
# - TOKEN_KEY
# - CREDENTIAL_KEY
# - INGEST_API_KEY
# - FETCH_API_KEY
# - ADMIN_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "headrss"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../adapter/d1/src/migrations"
